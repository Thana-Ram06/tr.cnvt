<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Converter</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>🎨 SVG Converter</h1>
            <p class="subtitle">Convert SVG images to PNG or JPG</p>

            <div class="upload-area" id="uploadArea">
                <label for="fileInput" class="upload-label">
                    <div class="upload-icon">🎨</div>
                    <p>Click to select SVG file or drag and drop</p>
                </label>
                <input type="file" id="fileInput" class="file-input" accept="image/svg+xml,.svg">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="options">
                <label for="formatSelect">Output Format:</label>
                <select id="formatSelect">
                    <option value="png" selected>PNG</option>
                    <option value="jpg">JPG</option>
                </select>

                <label for="width">Width (px):</label>
                <input type="number" id="width" value="800" min="100" max="4000">

                <label for="height">Height (px):</label>
                <input type="number" id="height" value="600" min="100" max="4000">

                <div id="qualityContainer" style="display: none;">
                    <label for="quality">JPG Quality:</label>
                    <select id="quality">
                        <option value="1.0">100% (Best Quality)</option>
                        <option value="0.95">95% (High Quality)</option>
                        <option value="0.9" selected>90% (Recommended)</option>
                        <option value="0.8">80% (Good Quality)</option>
                    </select>
                </div>

                <div id="backgroundColorContainer" style="display: none;">
                    <label for="backgroundColor">Background Color:</label>
                    <input type="color" id="backgroundColor" value="#ffffff">
                </div>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>Convert SVG</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Converting image...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="preview-area" id="previewArea">
                <h3>Preview:</h3>
                <div id="previewContainer"></div>
            </div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/svg-converter.js"></script>
</body>
</html>
