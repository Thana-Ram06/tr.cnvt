<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PNG Converter</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>🖼️ JPG to PNG</h1>
            <p class="subtitle">Convert JPG images to PNG format</p>

            <div class="upload-area" id="uploadArea">
                <label for="fileInput" class="upload-label">
                    <div class="upload-icon">🖼️</div>
                    <p>Click to select JPG file or drag and drop</p>
                </label>
                <input type="file" id="fileInput" class="file-input" accept="image/jpeg,image/jpg">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>Convert JPG to PNG</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Converting image...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="preview-area" id="previewArea">
                <h3>Preview:</h3>
                <img id="previewImage" style="max-width: 100%; border-radius: 8px;">
            </div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/jpg-to-png.js"></script>
</body>
</html>
