<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>🖼️ Image to PDF</h1>
            <p class="subtitle">Convert images to PDF (JPG, PNG, WEBP)</p>

            <div class="upload-area" id="uploadArea">
                <label for="fileInput" class="upload-label">
                    <div class="upload-icon">🖼️</div>
                    <p>Click to select images or drag and drop</p>
                    <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">Supports multiple images</p>
                </label>
                <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
            </div>

            <div class="file-info" id="fileInfo">
                <div id="fileList"></div>
            </div>

            <div class="options">
                <label for="pageSize">Page Size:</label>
                <select id="pageSize">
                    <option value="fit">Fit to Image</option>
                    <option value="a4" selected>A4</option>
                    <option value="letter">Letter</option>
                    <option value="legal">Legal</option>
                </select>

                <label for="orientation">Orientation:</label>
                <select id="orientation">
                    <option value="portrait" selected>Portrait</option>
                    <option value="landscape">Landscape</option>
                </select>

                <label for="imageQuality">Image Quality:</label>
                <select id="imageQuality">
                    <option value="1.0">High (1.0)</option>
                    <option value="0.9" selected>Medium (0.9)</option>
                    <option value="0.8">Low (0.8)</option>
                </select>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>Convert Images to PDF</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating PDF...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="preview-area" id="previewArea">
                <h3>Preview:</h3>
                <div id="previewImages"></div>
            </div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/image-to-pdf.js"></script>
</body>
</html>
