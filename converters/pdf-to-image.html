<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image Converter</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>📄 PDF to Image</h1>
            <p class="subtitle">Convert PDF pages to JPG or PNG images</p>

            <div class="upload-area" id="uploadArea">
                <label for="fileInput" class="upload-label">
                    <div class="upload-icon">📄</div>
                    <p>Click to select PDF or drag and drop</p>
                    <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">Supports multi-page PDFs</p>
                </label>
                <input type="file" id="fileInput" class="file-input" accept=".pdf">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="options">
                <label for="formatSelect">Output Format:</label>
                <select id="formatSelect">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>

                <label for="dpiSelect">Quality (DPI):</label>
                <select id="dpiSelect">
                    <option value="150">150 DPI (Fast)</option>
                    <option value="300" selected>300 DPI (Recommended)</option>
                    <option value="600">600 DPI (High Quality)</option>
                </select>

                <label for="pageSelect">Page Selection:</label>
                <select id="pageSelect">
                    <option value="all">All Pages</option>
                    <option value="single">Single Page</option>
                </select>

                <div id="pageNumberContainer" style="display: none;">
                    <label for="pageNumber">Page Number:</label>
                    <input type="number" id="pageNumber" min="1" value="1">
                </div>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>Convert PDF to Image</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing PDF...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="preview-area" id="previewArea">
                <h3>Preview:</h3>
                <div id="previewImages"></div>
            </div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/pdf-to-image.js"></script>
</body>
</html>
