<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF Converter</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>🌐 HTML to PDF</h1>
            <p class="subtitle">Convert HTML content to PDF</p>

            <div class="options">
                <label for="htmlInput">Paste HTML Code or Enter URL:</label>
                <textarea id="htmlInput" rows="10" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace;" placeholder="Paste your HTML code here or enter a URL starting with http:// or https://"></textarea>
                
                <label for="pageSize">Page Size:</label>
                <select id="pageSize">
                    <option value="a4" selected>A4</option>
                    <option value="letter">Letter</option>
                    <option value="legal">Legal</option>
                </select>

                <label for="orientation">Orientation:</label>
                <select id="orientation">
                    <option value="portrait" selected>Portrait</option>
                    <option value="landscape">Landscape</option>
                </select>

                <label for="quality">Quality:</label>
                <select id="quality">
                    <option value="1.0">High (1.0)</option>
                    <option value="0.8" selected>Medium (0.8)</option>
                    <option value="0.6">Low (0.6)</option>
                </select>
            </div>

            <button class="convert-btn" id="convertBtn">Convert HTML to PDF</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Rendering HTML and generating PDF...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="preview-area" id="previewArea" style="display: none;">
                <h3>Preview:</h3>
                <iframe id="previewFrame" style="width: 100%; height: 400px; border: 1px solid #ddd; border-radius: 8px;"></iframe>
            </div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/html-to-pdf.js"></script>
</body>
</html>
