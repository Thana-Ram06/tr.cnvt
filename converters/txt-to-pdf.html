<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT to PDF Converter</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="converter-page">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>📝 TXT to PDF</h1>
            <p class="subtitle">Convert text files to PDF documents</p>

            <div class="upload-area" id="uploadArea">
                <label for="fileInput" class="upload-label">
                    <div class="upload-icon">📝</div>
                    <p>Click to select TXT file or drag and drop</p>
                </label>
                <input type="file" id="fileInput" class="file-input" accept=".txt">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="options">
                <label for="fontSize">Font Size:</label>
                <select id="fontSize">
                    <option value="10">10pt</option>
                    <option value="12" selected>12pt</option>
                    <option value="14">14pt</option>
                    <option value="16">16pt</option>
                    <option value="18">18pt</option>
                </select>

                <label for="pageSize">Page Size:</label>
                <select id="pageSize">
                    <option value="a4" selected>A4</option>
                    <option value="letter">Letter</option>
                    <option value="legal">Legal</option>
                </select>

                <label for="orientation">Orientation:</label>
                <select id="orientation">
                    <option value="portrait" selected>Portrait</option>
                    <option value="landscape">Landscape</option>
                </select>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>Convert TXT to PDF</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating PDF...</p>
            </div>

            <div class="error" id="error"></div>
        </div>

        <footer>
            <p>All conversions happen in your browser. Your files never leave your device.</p>
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved</p>
            </div>
        </footer>
    </div>

    <script src="../js/txt-to-pdf.js"></script>
</body>
</html>
